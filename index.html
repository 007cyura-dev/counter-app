<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>カウンター</title>

<!-- ズーム防止 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
  body {
    text-align: center;
    font-family: sans-serif;
    margin: 0;
    min-height: 100vh;
    padding-top: 50px;
    touch-action: manipulation;
  }

  #count {
    font-size: 100px;
    margin: 30px;
  }

  button {
    font-size: 24px;
    padding: 15px;
    margin: 8px;
  }

  input {
    font-size: 20px;
    width: 80px;
    text-align: center;
  }
</style>
</head>
<body>

<h1>カウンター</h1>

<div id="count">0</div>

<button onclick="increment()">＋</button>
<button onclick="decrement()">－</button>
<button onclick="resetCount()">リセット</button>

<br><br>

<button id="loopBtn" onclick="toggleLoop()">ループ：ON</button>

<br><br>

<label>
  ループ数：
  <input type="number" id="loopInput" value="5" min="1">
</label>

<script>
let count = 0;
let loopOn = true;

// 最大値取得
function getMax() {
  const val = parseInt(document.getElementById("loopInput").value);
  return isNaN(val) || val < 1 ? 1 : val;
}

// 表示更新
function updateDisplay() {
  document.getElementById("count").textContent = count;
  document.getElementById("loopBtn").textContent =
    "ループ：" + (loopOn ? "ON" : "OFF");
}

// カウントアップ
function increment() {
  const max = getMax();

  if (loopOn) {
    if (count >= max) {
      count = 0;
    } else {
      count++;
    }
  } else {
    count++;
  }

  updateDisplay();
}

// 減算
function decrement() {
  if (count > 0) count--;
  updateDisplay();
}

// リセット
function resetCount() {
  count = 0;
  updateDisplay();
}

// ループ切替
function toggleLoop() {
  loopOn = !loopOn;
  updateDisplay();
}

// =======================
// タップ制御（最重要）
// =======================

// ボタン系判定
function isControlElement(target) {
  return target.closest("button") ||
         target.closest("input") ||
         target.closest("label");
}

// タップ処理
function handleTap(e) {

  // ▼ 下2cm（約80px）を無効
  const bottomLimit = window.innerHeight - 80;

  // タップ位置取得
  let touchY;
  if (e.touches && e.touches.length > 0) {
    touchY = e.touches[0].clientY;
  } else {
    touchY = e.clientY;
  }

  // 下部なら無視
  if (touchY > bottomLimit) return;

  // ボタン周り除外
  if (isControlElement(e.target)) return;

  increment();
}

// デバイス判定
const isTouchDevice = 'ontouchstart' in window;

// スマホ
if (isTouchDevice) {
  document.body.addEventListener("touchstart", handleTap, { passive: true });
}
// PC
else {
  document.body.addEventListener("click", handleTap);
}

updateDisplay();
</script>

</body>
</html>
